name: CI

on:
  push:
    branches: [main, winui-rewrite]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore Curfew.sln

      - name: Build solution (Core, Service)
        run: dotnet build Curfew.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test Curfew.sln -c Release --no-build --verbosity normal

      # The WinUI app needs an x64 platform and is built on its own so the
      # AnyCPU solution build above stays clean.
      - name: Build WinUI app (x64)
        run: dotnet build src/Curfew.App/Curfew.App.csproj -c Release -p:Platform=x64 -v detailed -bl:winui.binlog

      - name: Dump XAML compiler diagnostics
        if: failure()
        shell: pwsh
        run: |
          $dir = "src/Curfew.App/obj/x64/Release"
          Get-ChildItem -Recurse $dir -Filter output.json -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "===== $($_.FullName) ====="
            Get-Content $_.FullName
          }
          Get-ChildItem -Recurse $dir -Filter *.json -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'rror|iagnost' } | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="; Get-Content $_.FullName }

      - name: Upload WinUI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winui-binlog
          path: winui.binlog
          if-no-files-found: ignore
