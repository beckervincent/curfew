name: CI

on:
  push:
    branches: [main, winui-rewrite]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore Curfew.sln

      - name: Build solution (Core, Service)
        run: dotnet build Curfew.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test Curfew.sln -c Release --no-build --verbosity normal

      # The WinUI app needs an x64 platform and is built on its own so the
      # AnyCPU solution build above stays clean.
      - name: Build WinUI app (x64)
        run: dotnet build src/Curfew.App/Curfew.App.csproj -c Release -p:Platform=x64 -v detailed -bl:winui.binlog

      - name: Re-run XamlCompiler to capture crash
        if: failure()
        shell: pwsh
        run: |
          $xc = Get-ChildItem "$env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk" -Recurse -Filter XamlCompiler.exe -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match 'net472' } | Select-Object -First 1
          $inp = Get-ChildItem "src/Curfew.App/obj" -Recurse -Filter input.json -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $xc -or -not $inp) { Write-Host "XamlCompiler or input.json not found"; exit 0 }
          $out = Join-Path $inp.Directory.FullName "output.recap.json"
          Write-Host "xc   = $($xc.FullName)"
          Write-Host "input= $($inp.FullName)"
          Write-Host "===== XamlCompiler stdout/stderr ====="
          & $xc.FullName $inp.FullName $out 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "exit = $LASTEXITCODE"
          if (Test-Path $out) { Write-Host "===== output.recap.json ====="; Get-Content $out }

      - name: Upload WinUI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winui-binlog
          path: winui.binlog
          if-no-files-found: ignore
