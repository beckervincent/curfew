name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check & lint (Windows cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Linux runner + mingw cross-check is much faster than a Windows runner.
      - name: Install mingw cross compiler
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --target x86_64-pc-windows-gnu -- -D warnings
