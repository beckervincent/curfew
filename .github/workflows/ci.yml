name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# CI only builds and tests; it never needs to write to the repo. Drop the default
# token down to read-only so a compromised build step can't push or alter releases.
permissions:
  contents: read

# Run JavaScript-based actions on Node.js 24 (Node.js 20 is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the checkout token persisted in .git/config for later steps.
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore Curfew.sln

      - name: Build solution (Core, Service)
        run: dotnet build Curfew.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test Curfew.sln -c Release --no-build --verbosity normal

      # The WinUI app needs an x64 platform and is built on its own so the
      # AnyCPU solution build above stays clean.
      - name: Build WinUI app (x64)
        run: dotnet build src/Curfew.App/Curfew.App.csproj -c Release -p:Platform=x64
