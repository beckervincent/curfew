name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Run JavaScript-based actions on Node.js 24 (Node.js 20 is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build installer and publish release
    runs-on: windows-latest

    # Self-signed Authenticode cert lives in repo secrets. It gives no SmartScreen
    # reputation (it is not chained to a trusted CA, so Windows still warns), but it
    # stamps a stable publisher identity and makes post-build tampering detectable.
    # Exposed as env so the signing steps can be skipped cleanly when absent.
    env:
      SIGN_PFX_BASE64: ${{ secrets.CURFEW_SIGN_PFX_BASE64 }}
      SIGN_PFX_PASSWORD: ${{ secrets.CURFEW_SIGN_PFX_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Decode signing certificate
        id: cert
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "curfew-sign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          "PFX_PATH=$pfxPath" >> $env:GITHUB_OUTPUT
          Write-Host "Signing certificate decoded to runner temp."

      - name: Resolve version
        id: ver
        shell: pwsh
        env:
          # Pass the ref through the environment, never interpolated into the script
          # body, so a crafted branch/tag name cannot inject PowerShell.
          REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:REF_NAME
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Refusing to release: ref '$tag' is not a vMAJOR.MINOR.PATCH tag. Push a tag like v1.5.4."
          }
          "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Publish service (self-contained x64)
        run: >
          dotnet publish src/Curfew.Service/Curfew.Service.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/service

      - name: Publish app (self-contained x64)
        run: >
          dotnet publish src/Curfew.App/Curfew.App.csproj
          -c Release -r win-x64 --self-contained -p:Platform=x64
          -p:WindowsAppSDKSelfContained=true
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/app

      - name: Publish overlay (self-contained x64)
        run: >
          dotnet publish src/Curfew.Overlay/Curfew.Overlay.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/overlay

      - name: Sign binaries
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            "${{ steps.cert.outputs.PFX_PATH }}", $env:SIGN_PFX_PASSWORD, 'Exportable,PersistKeySet')
          $targets = Get-ChildItem -Path installer/service, installer/app, installer/overlay `
            -Recurse -Include Curfew*.exe
          foreach ($f in $targets) {
            $res = Set-AuthenticodeSignature -FilePath $f.FullName -Certificate $cert `
              -HashAlgorithm SHA256 -TimestampServer "http://timestamp.digicert.com"
            Write-Host "$($f.Name): $($res.Status) $($res.StatusMessage)"
            # A self-signed cert reports NotTrusted (no CA chain), which is expected.
            # Only a missing signer means signing actually failed.
            if ($null -eq $res.SignerCertificate) { throw "No signature applied to $($f.Name)" }
          }

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.ver.outputs.VERSION }}" "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Sign installer
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            "${{ steps.cert.outputs.PFX_PATH }}", $env:SIGN_PFX_PASSWORD, 'Exportable,PersistKeySet')
          $installer = "curfew-setup-v${{ steps.ver.outputs.VERSION }}.exe"
          $res = Set-AuthenticodeSignature -FilePath $installer -Certificate $cert `
            -HashAlgorithm SHA256 -TimestampServer "http://timestamp.digicert.com"
          Write-Host "${installer}: $($res.Status) $($res.StatusMessage)"
          if ($null -eq $res.SignerCertificate) { throw "Installer was not signed" }

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag = "v$version"
          $installer = "curfew-setup-v$version.exe"
          $notes = @"
          ### Installation

          1. Download ``$installer``
          2. Run it as Administrator and follow the setup wizard

          Requires Windows 10/11 (64-bit). Uninstall via *Settings -> Apps*.
          "@
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8

          # Publish a SHA-256 checksum alongside the installer so a download can be
          # verified out-of-band (a step toward provenance for the unsigned-by-CA exe).
          $sha = (Get-FileHash -Algorithm SHA256 -Path $installer).Hash.ToLower()
          "$sha  $installer" | Out-File -FilePath "$installer.sha256" -Encoding ascii
          Write-Host "SHA-256: $sha"

          # Ship as a pre-release: the v1.6.x line is still being validated on the
          # test fleet, so it must NOT become the "Latest" release that stable users
          # auto-update to (they stay pinned to the current stable). The updater's
          # prerelease channel still picks it up. Promote to stable later by editing
          # the release to --latest once a build is proven in the field.
          # No --clobber: never silently overwrite an already-published artifact. A
          # re-run on an existing tag fails loudly instead of replacing the release.
          gh release create $tag --title "Curfew v$version" --notes-file "RELEASE_NOTES.md" --prerelease $installer "$installer.sha256"
          if ($LASTEXITCODE -ne 0) { throw "Release creation failed (does the tag already have a release?)" }
