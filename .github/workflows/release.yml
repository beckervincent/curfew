name: Build and Release

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Get version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Get short commit hash
        id: commit
        shell: pwsh
        run: |
          $hash = git rev-parse --short HEAD
          echo "HASH=$hash" >> $env:GITHUB_OUTPUT
          echo "Commit: $hash"

      - name: Download NSSM
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" -OutFile nssm.zip
          Expand-Archive -Path nssm.zip -DestinationPath nssm-tmp -Force
          Copy-Item "nssm-tmp\nssm-2.24\win64\nssm.exe" -Destination "nssm.exe"

      - name: Stage installer source files
        shell: pwsh
        run: |
          Copy-Item "target\release\screen-time-manager.exe" -Destination "installer\screen-time-manager.exe"
          Copy-Item "nssm.exe" -Destination "installer\nssm.exe"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion="$version" "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $hash = "${{ steps.commit.outputs.HASH }}"
          $date = Get-Date -Format "yyyy-MM-dd"
          $installerName = "screen-time-manager-setup-v$version.exe"

          $notes = @"
          ## Screen Time Manager v$version

          **Release Date:** $date
          **Commit:** $hash

          ### Installation

          1. Download ``$installerName``
          2. Run it as Administrator
          3. Follow the setup wizard — the service installs and starts automatically

          ### Uninstalling

          Run the uninstaller from *Settings → Apps* or *Control Panel → Programs*.
          You will be asked whether to delete all stored data (time limits, passcode, history).

          ### Requirements

          - Windows 10 or later (64-bit)
          - Administrator rights during install/uninstall
          "@

          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8
          $installerFile = "screen-time-manager-setup-v$version.exe"
          echo "INSTALLER_FILE=$installerFile" >> $env:GITHUB_ENV

      - name: Check if release exists
        id: check_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tagName = "v$version"
          $releases = gh release list --json tagName | ConvertFrom-Json
          $exists = $releases | Where-Object { $_.tagName -eq $tagName }
          if ($exists) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: steps.check_release.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tagName = "v$version"
          gh release create $tagName `
            --title "Screen Time Manager v$version" `
            --notes-file "RELEASE_NOTES.md" `
            $env:INSTALLER_FILE

      - name: Update existing release
        if: steps.check_release.outputs.EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tagName = "v$version"
          $installerFile = $env:INSTALLER_FILE
          $assets = gh release view $tagName --json assets | ConvertFrom-Json
          foreach ($asset in $assets.assets) {
            if ($asset.name -eq $installerFile) {
              gh release delete-asset $tagName $asset.name --yes
            }
          }
          gh release upload $tagName $installerFile --clobber
