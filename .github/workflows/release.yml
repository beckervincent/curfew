name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build installer and publish release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Get version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      # NSSM is built and released from beckervincent/nssm-fork; we always bundle its latest release.
      - name: Download NSSM
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $latestTag = gh release list --repo beckervincent/nssm-fork --limit 1 --json tagName |
            ConvertFrom-Json | Select-Object -ExpandProperty tagName
          gh release download $latestTag --repo beckervincent/nssm-fork --pattern "nssm-win64.exe" --output nssm.exe
          if (-not (Test-Path "nssm.exe") -or (Get-Item "nssm.exe").Length -eq 0) {
            throw "Failed to download nssm.exe"
          }

      - name: Build installer
        shell: pwsh
        run: |
          Copy-Item "target\release\screen-time-manager.exe" -Destination "installer\screen-time-manager.exe"
          Copy-Item "nssm.exe" -Destination "installer\nssm.exe"
          $version = "${{ steps.version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "v$version"
          $installer = "curfew-setup-v$version.exe"
          $notes = @"
          ### Installation

          1. Download ``$installer``
          2. Run it as Administrator and follow the setup wizard

          Requires Windows 10/11 (64-bit). Uninstall via *Settings -> Apps*.
          "@
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8

          # Create the release, or just refresh the asset if it already exists.
          gh release create $tag --title "Curfew v$version" --notes-file "RELEASE_NOTES.md" --latest $installer
          if ($LASTEXITCODE -ne 0) {
            gh release upload $tag $installer --clobber
            if ($LASTEXITCODE -ne 0) { throw "Release upload failed" }
          }
