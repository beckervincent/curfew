name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Run JavaScript-based actions on Node.js 24 (Node.js 20 is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build installer and publish release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') { $version = '1.0.0' }
          "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Publish service (self-contained x64)
        run: >
          dotnet publish src/Curfew.Service/Curfew.Service.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/service

      - name: Publish app (self-contained x64)
        run: >
          dotnet publish src/Curfew.App/Curfew.App.csproj
          -c Release -r win-x64 --self-contained -p:Platform=x64
          -p:WindowsAppSDKSelfContained=true
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/app

      - name: Publish overlay (self-contained x64)
        run: >
          dotnet publish src/Curfew.Overlay/Curfew.Overlay.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o installer/overlay

      - name: Download NSSM
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = gh release list --repo beckervincent/nssm-fork --limit 1 --json tagName |
            ConvertFrom-Json | Select-Object -ExpandProperty tagName
          gh release download $tag --repo beckervincent/nssm-fork --pattern "nssm-win64.exe" --output installer/nssm.exe
          if (-not (Test-Path "installer/nssm.exe") -or (Get-Item "installer/nssm.exe").Length -eq 0) {
            throw "Failed to download nssm.exe"
          }

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.ver.outputs.VERSION }}" "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag = "v$version"
          $installer = "curfew-setup-v$version.exe"
          $notes = @"
          ### Installation

          1. Download ``$installer``
          2. Run it as Administrator and follow the setup wizard

          Requires Windows 10/11 (64-bit). Uninstall via *Settings -> Apps*.
          "@
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8

          gh release create $tag --title "Curfew v$version" --notes-file "RELEASE_NOTES.md" --latest $installer
          if ($LASTEXITCODE -ne 0) {
            gh release upload $tag $installer --clobber
            if ($LASTEXITCODE -ne 0) { throw "Release upload failed" }
          }
